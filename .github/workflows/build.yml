name: Build 3DS Homebrew

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build 3DSX
      run: |
        cd 3ds-client
        make
    
    - name: Upload 3DSX
      uses: actions/upload-artifact@v4
      with:
        name: hermes3ds
        path: 3ds-client/hermes3ds.3dsx
